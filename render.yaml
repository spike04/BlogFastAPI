services:
  - type: web
    name: fastapi-blog
    env: python
    plan: free
    pythonVersion: 3.14.4
    buildCommand: pip install .
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    releaseCommand: alembic upgrade head
    envVars:
      - key: FRONTEND_URL
        value: https://fastapi-blog.onrender.com
      - key: MAIL_USE_TLS
        value: "true"
      - key: ALGORITHM
        value: HS256

# Uncomment the database section if you want Render to provision a managed PostgreSQL database.
# databases:
#   - name: blog-db
#     engine: postgresql
#     version: 15
#     plan: free
